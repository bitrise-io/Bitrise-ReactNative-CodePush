appId: org.reactjs.native.example.BitriseReactNativeCodePush
---
- launchApp
- extendedWaitUntil:
    visible: "Todo List Updated Tests"
    timeout: 60000
- assertVisible: "Todo List Updated Tests"
- stopApp
- launchApp
- extendedWaitUntil:
    visible: ${CODEPUSH_UPDATE_MARKER}
    timeout: 60000
- assertVisible: ${CODEPUSH_UPDATE_MARKER}
