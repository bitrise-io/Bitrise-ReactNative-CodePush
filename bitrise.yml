    - bundle::assert_codepush_signature_rejection: {}
    - bundle::notify_slack_on_failure:
        inputs:
        - PRETEXT: ":rotating_light: *[Bare RN] CodePush E2E negative test failed*"
        - MESSAGE: 'Possible issue: SDK did NOT reject the wrong-key update as expected.
            The app may have applied an update signed with a mismatched key —
            signature enforcement may be broken. — Logs: $BITRISE_BUILD_URL'
  codepush_verify_unsigned:
    meta:
      bitrise.io:
        stack: osx-xcode-16.0.x
        machine_type_id: g2.mac.medium
    steps:
    - bundle::verify_codepush:
        inputs:
