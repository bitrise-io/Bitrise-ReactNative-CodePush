    - bundle::generate_codepush_marker:
        inputs:
        - MARKER_ENV_KEY: CODEPUSH_UPDATE_MARKER_UNSIGNED
    - script@1:
        title: Install Bitrise CodePush CLI plugin
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            set -o pipefail
            set -x
            INSTALLED=$(bitrise :codepush version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
            if [ -n "$CODEPUSH_CLI_VERSION" ]; then
              TARGET="$CODEPUSH_CLI_VERSION"
            else
              TARGET=$(curl -sf https://api.github.com/repos/bitrise-io/bitrise-plugins-codepush-cli/releases/latest 2>/dev/null | jq -r '.tag_name // empty' 2>/dev/null || true)
            fi
            if [ -n "$TARGET" ] && [ "$INSTALLED" = "$TARGET" ]; then
              echo "CodePush CLI $INSTALLED is up to date, skipping install"
            else
              bitrise plugin install --source https://github.com/bitrise-io/bitrise-plugins-codepush-cli.git ${CODEPUSH_CLI_VERSION:+--version "$CODEPUSH_CLI_VERSION"}
            fi
    - script@1:
        title: Push unsigned update to signed app
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            set -o pipefail
            set -x

            export BITRISE_API_TOKEN="$BITRISE_PAT"

            bitrise :codepush push \
              --bundle \
              --platform ios \
              --app-version "$NEW_APP_VERSION_UNSIGNED" \
              --deployment "$CODE_PUSH_DEPLOYMENT_ID_IOS_STAGE" \
              --app-id "$CONNECTED_APP_ID_IOS" \
              --description "E2E negative test (unsigned) - marker: $CODEPUSH_UPDATE_MARKER_UNSIGNED" \
              --rollout 100
    - script@1:
        title: Verify update was published to deployment
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            for i in 1 2 3; do
              RESPONSE=$(curl -s -w "\n%{http_code}" \
                -H "authorization: $BITRISE_PAT" \
                "https://api.bitrise.io/release-management/v2/code-push/v1/updates?deployment_id=$CODE_PUSH_DEPLOYMENT_ID_IOS_STAGE")
              HTTP_CODE=$(echo "$RESPONSE" | tail -1)
              BODY=$(echo "$RESPONSE" | head -n -1)
              [ "$HTTP_CODE" = "200" ] || (echo "ERROR: API returned HTTP $HTTP_CODE: $BODY" && exit 1)
              echo "$BODY" | grep -q "$CODEPUSH_UPDATE_MARKER_UNSIGNED" && break
              echo "Attempt $i: marker not found yet, retrying in 5s..."
              sleep 5
            done
            echo "$BODY" | grep -q "$CODEPUSH_UPDATE_MARKER_UNSIGNED" \
              || (echo "ERROR: marker $CODEPUSH_UPDATE_MARKER_UNSIGNED not found in deployment after 3 attempts" && exit 1)
            echo "OK: update confirmed in deployment history"
    - bundle::notify_slack_on_failure:
        inputs:
        - MESSAGE: "Possible issue: unsigned chain upload step failed. The CLI push exited with an error or the update was not published to the deployment. — Logs: $BITRISE_BUILD_URL"
    - share-pipeline-variable@1.1.0:
        inputs:
        - variables: CODEPUSH_UPDATE_MARKER_UNSIGNED
  codepush_verify_wrong_key:
    meta:
      bitrise.io:
        stack: osx-xcode-16.0.x
        machine_type_id: g2.mac.medium
    steps:
    - bundle::verify_codepush:
        inputs:
        - ARTIFACT_SOURCE_WORKFLOW: codepush_build_binary_wrong_key
        - CODEPUSH_MARKER: $CODEPUSH_UPDATE_MARKER_WRONG_KEY
        - MAESTRO_TEST_FILE: .maestro/codepush_negative_test.yaml
    - script@1:
        title: Assert SDK rejection log line is present
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            LOG=/tmp/codepush_simulator_log.txt
            xcrun simctl spawn booted log show \
              --predicate 'eventMessage contains[cd] "CodePush"' \
              --last 10m \
              >> "$LOG" 2>/dev/null || true
            [ -s "$LOG" ] || (echo "ERROR: simulator log is empty or missing" && exit 1)
            grep -qi \
              "CodePush.*sign\|CodePush.*verif\|code.sign.*CodePush\|verif.*CodePush" \
              "$LOG" \
              || (echo "ERROR: no CodePush signature rejection log line found — SDK may not have enforced signing" && exit 1)
            echo "OK: SDK rejection log line confirmed:"
            grep -i "CodePush.*sign\|CodePush.*verif\|code.sign.*CodePush\|verif.*CodePush" "$LOG" | head -5
    - bundle::notify_slack_on_failure:
        inputs:
        - PRETEXT: ":rotating_light: *[Bare RN] CodePush E2E negative test failed*"
        - MESSAGE: "Possible issue: SDK did NOT reject the wrong-key update as expected. The app may have applied an update signed with a mismatched key — signature enforcement may be broken. — Logs: $BITRISE_BUILD_URL"
  codepush_verify_unsigned:
    meta:
      bitrise.io:
        stack: osx-xcode-16.0.x
        machine_type_id: g2.mac.medium
    steps:
    - bundle::verify_codepush:
        inputs:
        - ARTIFACT_SOURCE_WORKFLOW: codepush_build_binary_unsigned
        - CODEPUSH_MARKER: $CODEPUSH_UPDATE_MARKER_UNSIGNED
        - MAESTRO_TEST_FILE: .maestro/codepush_negative_test.yaml
    - script@1:
        title: Assert SDK rejection log line is present
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            LOG=/tmp/codepush_simulator_log.txt
            xcrun simctl spawn booted log show \
              --predicate 'eventMessage contains[cd] "CodePush"' \
              --last 10m \
              >> "$LOG" 2>/dev/null || true
            [ -s "$LOG" ] || (echo "ERROR: simulator log is empty or missing" && exit 1)
            grep -qi \
              "CodePush.*sign\|CodePush.*verif\|code.sign.*CodePush\|verif.*CodePush" \
              "$LOG" \
              || (echo "ERROR: no CodePush signature rejection log line found — SDK may not have enforced signing" && exit 1)
            echo "OK: SDK rejection log line confirmed:"
            grep -i "CodePush.*sign\|CodePush.*verif\|code.sign.*CodePush\|verif.*CodePush" "$LOG" | head -5
    - bundle::notify_slack_on_failure:
        inputs:
        - PRETEXT: ":rotating_light: *[Bare RN] CodePush E2E negative test failed*"
        - MESSAGE: "Possible issue: SDK did NOT reject the unsigned update as expected. The app may have applied an unsigned update despite signature enforcement being enabled. — Logs: $BITRISE_BUILD_URL"
app:
  envs:
  - BITRISE_PROJECT_PATH: ios/BitriseReactNativeCodePush.xcworkspace
    opts:
      is_expand: false
  - BITRISE_SCHEME: BitriseReactNativeCodePush
    opts:
