  codepush_cli_signed_export_upload:
    meta:
      bitrise.io:
        stack: ubuntu-noble-24.04-bitrise-2025-android
        machine_type_id: g2.linux.medium
    steps:
    - bundle::codepush_js_prepare:
        inputs:
        - APP_VERSION: "$NEW_APP_VERSION_SIGNED"
    - bundle::generate_codepush_marker:
        inputs:
        - MARKER_ENV_KEY: CODEPUSH_UPDATE_MARKER_SIGNED
    - bundle::install_codepush_cli: {}
    - script@1:
        title: Write CodePush signing key
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            [ -n "$CODEPUSH_PRIVATE_KEY" ] || (echo "ERROR: CODEPUSH_PRIVATE_KEY is empty" && exit 1)
            printf '%s' "$CODEPUSH_PRIVATE_KEY" > /tmp/codepush_private_key.pem
            chmod 600 /tmp/codepush_private_key.pem
    - bundle::codepush_cli_push:
        inputs:
        - APP_VERSION: "$NEW_APP_VERSION_SIGNED"
        - DESCRIPTION: 'E2E test (signed) - marker: $CODEPUSH_UPDATE_MARKER_SIGNED'
        - PRIVATE_KEY_PATH: "/tmp/codepush_private_key.pem"
    - bundle::notify_slack_on_failure:
        inputs:
        - MESSAGE: 'Possible issue: signed chain upload step failed. The CLI push exited
            with an error or the signed update was rejected by the server. —
            Logs: $BITRISE_BUILD_URL'
    - share-pipeline-variable@1.1.0:
        inputs:
        - variables: CODEPUSH_UPDATE_MARKER_SIGNED
  codepush_verify:
