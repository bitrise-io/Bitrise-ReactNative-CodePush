    - bundle::generate_codepush_marker:
        inputs:
        - MARKER_ENV_KEY: CODEPUSH_UPDATE_MARKER_SIGNED
    - script@1:
        title: Install Bitrise CodePush CLI plugin
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            set -o pipefail
            set -x
            INSTALLED=$(bitrise :codepush version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
            if [ -n "$CODEPUSH_CLI_VERSION" ]; then
              TARGET="$CODEPUSH_CLI_VERSION"
            else
              TARGET=$(curl -sf https://api.github.com/repos/bitrise-io/bitrise-plugins-codepush-cli/releases/latest 2>/dev/null | jq -r '.tag_name // empty' 2>/dev/null || true)
            fi
            if [ -n "$TARGET" ] && [ "$INSTALLED" = "$TARGET" ]; then
              echo "CodePush CLI $INSTALLED is up to date, skipping install"
            else
              bitrise plugin install --source https://github.com/bitrise-io/bitrise-plugins-codepush-cli.git ${CODEPUSH_CLI_VERSION:+--version "$CODEPUSH_CLI_VERSION"}
            fi
    - script@1:
        title: Write CodePush signing key
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            [ -n "$CODEPUSH_PRIVATE_KEY" ] || (echo "ERROR: CODEPUSH_PRIVATE_KEY is empty" && exit 1)
            printf '%s' "$CODEPUSH_PRIVATE_KEY" > /tmp/codepush_private_key.pem
            chmod 600 /tmp/codepush_private_key.pem
    - script@1:
        title: Push CodePush update via CLI (signed)
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            set -o pipefail
            set -x

            export BITRISE_API_TOKEN="$BITRISE_PAT"

            bitrise :codepush push \
              --bundle \
              --platform ios \
              --app-version "$NEW_APP_VERSION_SIGNED" \
              --deployment "$CODE_PUSH_DEPLOYMENT_ID_IOS_STAGE" \
              --app-id "$CONNECTED_APP_ID_IOS" \
              --description "E2E test (signed) - marker: $CODEPUSH_UPDATE_MARKER_SIGNED" \
              --rollout 100 \
              --private-key-path /tmp/codepush_private_key.pem
    - bundle::notify_slack_on_failure:
        inputs:
        - MESSAGE: "Possible issue: signed chain upload step failed. The CLI push exited with an error or the signed update was rejected by the server. — Logs: $BITRISE_BUILD_URL"
    - share-pipeline-variable@1.1.0:
        inputs:
        - variables: CODEPUSH_UPDATE_MARKER_SIGNED
  codepush_verify:
    meta:
      bitrise.io:
        stack: osx-xcode-16.0.x
        machine_type_id: g2.mac.medium
    steps:
    - bundle::verify_codepush:
        inputs:
        - ARTIFACT_SOURCE_WORKFLOW: codepush_build_binary_plain
    - bundle::notify_slack_on_failure:
        inputs:
        - MESSAGE: "Possible issue: API chain verify failed. The update marker was not visible in the app, or the update was not applied after restart. — Logs: $BITRISE_BUILD_URL"
  codepush_verify_cli:
    meta:
      bitrise.io:
        stack: osx-xcode-16.0.x
        machine_type_id: g2.mac.medium
    steps:
    - bundle::verify_codepush:
        inputs:
        - ARTIFACT_SOURCE_WORKFLOW: codepush_build_binary_cli
        - CODEPUSH_MARKER: $CODEPUSH_UPDATE_MARKER_CLI
    - bundle::notify_slack_on_failure:
        inputs:
        - MESSAGE: "Possible issue: CLI chain verify failed. The update marker was not visible in the app, or the update was not applied after restart. — Logs: $BITRISE_BUILD_URL"
  codepush_verify_signed:
    meta:
      bitrise.io:
        stack: osx-xcode-16.0.x
        machine_type_id: g2.mac.medium
    steps:
    - bundle::verify_codepush:
        inputs:
        - ARTIFACT_SOURCE_WORKFLOW: codepush_build_binary_signed
        - CODEPUSH_MARKER: $CODEPUSH_UPDATE_MARKER_SIGNED
    - bundle::notify_slack_on_failure:
        inputs:
        - MESSAGE: "Possible issue: signed chain verify failed. The signed update was not applied, or the app rejected it unexpectedly. — Logs: $BITRISE_BUILD_URL"
  codepush_bump_version_wrong_key:
