    opts:
      is_expand: false
  - CONNECTED_APP_ID_IOS: aaad9c12-d388-447a-81f4-3c980e9b4ece
    opts:
      is_expand: false
  - CONNECTED_APP_ID_ANDROID: ee256b46-93f1-477a-82ec-774163218c54
    opts:
      is_expand: false
  - CODE_PUSH_DEPLOYMENT_ID_IOS_STAGE: 041c0665-5c0a-4958-a85e-ddcc535f9cab
