      bitrise.io:
        stack: osx-xcode-16.0.x
        machine_type_id: g2.mac.medium
    steps:
    - bundle::verify_codepush:
        inputs:
        - ARTIFACT_SOURCE_WORKFLOW: codepush_build_binary_plain
    - bundle::notify_slack_on_failure:
        inputs:
        - MESSAGE: 'Possible issue: API chain verify failed. The update marker was not
            visible in the app, or the update was not applied after restart. —
            Logs: $BITRISE_BUILD_URL'
  codepush_verify_cli:
