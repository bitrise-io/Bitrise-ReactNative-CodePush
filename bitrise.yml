        - MAESTRO_TEST_FILE: ".maestro/codepush_negative_test.yaml"
    - bundle::assert_codepush_signature_rejection: {}
    - bundle::notify_slack_on_failure:
        inputs:
        - PRETEXT: ":rotating_light: *[Bare RN] CodePush E2E negative test failed*"
        - MESSAGE: 'Possible issue: SDK did NOT reject the unsigned update as expected.
            The app may have applied an unsigned update despite signature
            enforcement being enabled. — Logs: $BITRISE_BUILD_URL'
  codepush_diff_build_binary:
    summary: Build the unsigned simulator binary used by the bundle-diff E2E test.
    meta:
      bitrise.io:
        stack: osx-xcode-16.0.x
        machine_type_id: g2.mac.medium
    steps:
    - bundle::fetch_source: {}
    - script@1:
        title: Read CodePush app version for diff test
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            # Both updates (A and B) in the diff test must target this exact
            # app version, so it is read once here and shared with the test
            # stage as a pipeline variable. It is intentionally NOT bumped:
            # keeping A and B on the same app version is what makes B a valid
            # diff target for a client running A.
            VERSION=$(node -p "require('./codepush-diff-version.json').version")
            [ -n "$VERSION" ] || (echo "ERROR: could not read version from codepush-diff-version.json" && exit 1)
            envman add --key CODEPUSH_APP_VERSION --value "$VERSION"
            echo "Bundle-diff app version: $VERSION"
    - bundle::build_binary_simulator:
        inputs:
        - APP_VERSION: "$CODEPUSH_APP_VERSION"
    - share-pipeline-variable@1.1.0:
        inputs:
        - variables: CODEPUSH_APP_VERSION
  codepush_diff_test:
    summary: Two-phase bundle-diff E2E test — install update A, then verify update B
      is served as a diff.
    description: |-
      Runs both phases on a single machine because the simulator state (the
      installed package A and the hash the SDK reports on the next update
      check) must persist between phases and cannot survive a pipeline-stage
      boundary.

      Phase A: push update A (unsigned), install the binary, let the SDK
      download and apply A, and assert marker A is visible.
      Phase B: push update B at the SAME app version, wait until the server
      has generated B's diff_package_map, then launch the app so a client on
      A receives a diff. Assert marker B is visible AND that the simulator log
      shows the diff was served (hotcodepush.json / diff- URL) rather than a
      full package.
    meta:
      bitrise.io:
        stack: osx-xcode-16.0.x
        machine_type_id: g2.mac.medium
    steps:
    - bundle::codepush_js_prepare:
        inputs:
        - APP_VERSION: "$CODEPUSH_APP_VERSION"
    - bundle::generate_codepush_marker:
        inputs:
        - MARKER_ENV_KEY: CODEPUSH_UPDATE_MARKER_A
    - bundle::rn_export_and_upload:
        inputs:
        - CONNECTED_APP_ID: "$CONNECTED_APP_ID_IOS"
        - DEPLOYMENT_ID: "$CODE_PUSH_DEPLOYMENT_ID_IOS_STAGE"
        - DESCRIPTION: 'E2E bundle diff test - update A - marker: $CODEPUSH_UPDATE_MARKER_A'
    - bundle::verify_codepush:
        inputs:
        - ARTIFACT_SOURCE_WORKFLOW: codepush_diff_build_binary
        - CODEPUSH_MARKER: "$CODEPUSH_UPDATE_MARKER_A"
    - script@1:
        title: Resolve update A manifest hash (via update_check)
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e

            # Resolve update A's CodePush MANIFEST hash by calling update_check as a
            # fresh client (no package_hash) after Phase A. The server returns update A
            # as the latest package, and update_info.package_hash IS the manifest hash
            # the SDK sends on subsequent checks -- the same key used in diff_package_map.
            # The package detail API's `hash` field is the zip-file SHA256, which is NOT
            # the manifest hash, so it MUST NOT be used here.

            DEPLOYMENT_KEY="${CODE_PUSH_DEPLOYMENT_KEY_IOS_STAGE}"
            SERVER_URL="https://${BITRISE_WORKSPACE_ID}.codepush.bitrise.io"
            QUERY="deployment_key=$(jq -rn --arg v "$DEPLOYMENT_KEY" '$v|@uri')&app_version=${CODEPUSH_APP_VERSION}&package_hash=&client_unique_id=diff-resolve-$(date +%s)&is_companion=false"
            URL="${SERVER_URL}/v0.1/public/codepush/update_check?${QUERY}"

            echo "Resolving update A manifest hash via update_check..."
            RESP=$(curl -s -w "\n%{http_code}" "$URL")
            HTTP_CODE=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            [ "$HTTP_CODE" = "200" ] || (echo "ERROR: update_check returned HTTP $HTTP_CODE: $BODY" && exit 1)

            HASH=$(echo "$BODY" | jq -r '.update_info.package_hash // empty' 2>/dev/null || true)

            if [ -n "$HASH" ] && [ "$HASH" != "null" ]; then
              echo "Resolved update A manifest hash from update_check: $HASH"
            else
              # Fallback: read from the simulator log (App.tsx logs "[CodePush] Package hash: X" on mount)
              echo "update_check gave no hash; falling back to simulator log"
              if [ -f /tmp/codepush_simulator_log.txt ]; then
                HASH=$(grep -oE "\[CodePush\] Package hash: [A-Za-z0-9+/=._-]+" /tmp/codepush_simulator_log.txt \
                  | tail -1 | sed -E 's/.*Package hash: //' || true)
              fi
              [ -n "$HASH" ] && echo "Resolved update A manifest hash from simulator log: $HASH"
            fi

            [ -n "$HASH" ] || (echo "ERROR: could not determine update A manifest hash" && exit 1)
            envman add --key CODEPUSH_PACKAGE_HASH_A --value "$HASH"
    - bundle::codepush_js_prepare:
        inputs:
        - APP_VERSION: "$CODEPUSH_APP_VERSION"
    - bundle::generate_codepush_marker:
        inputs:
        - MARKER_ENV_KEY: CODEPUSH_UPDATE_MARKER_B
    - bundle::rn_export_and_upload:
        inputs:
        - CONNECTED_APP_ID: "$CONNECTED_APP_ID_IOS"
        - DEPLOYMENT_ID: "$CODE_PUSH_DEPLOYMENT_ID_IOS_STAGE"
        - DESCRIPTION: 'E2E bundle diff test - update B - marker: $CODEPUSH_UPDATE_MARKER_B'
    - script@1:
        title: Wait until update_check serves a diff for update A
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            # The upload step already blocked until B reached processed_valid.
            # Probe the public update_check endpoint as a client running update A
            # and wait until the server answers with a diff download URL (proving
            # B's diff against A has been generated and is being served). The
            # script derives the deployment_key from CODE_PUSH_DEPLOYMENT_KEY_IOS_STAGE
            # and the server URL from BITRISE_WORKSPACE_ID.
            POLL_TIMEOUT_SECONDS=60 \
            POLL_INTERVAL_SECONDS=5 \
            /bin/bash ./scripts/codepush/poll_diff_package_map.sh "$CODEPUSH_PACKAGE_HASH_A" "$CODEPUSH_APP_VERSION"
    - bundle::setup_maestro: {}
    - script@1:
        title: Start simulator log capture for diff verification
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            rm -f /tmp/codepush-sim-log.txt
            # Filter on the message text, not the process name. The SDK logs via
            # CPLog -> NSLog with a "[CodePush] " prefix (CodePushUtils.m), so an
            # eventMessage predicate reliably captures every SDK line regardless
            # of how the log subsystem attributes the process. This mirrors the
            # 'eventMessage contains[cd] "CodePush"' predicate the signed/unsigned
            # negative tests already rely on.
            xcrun simctl spawn booted log stream \
              --predicate 'eventMessage contains[cd] "CodePush"' \
              > /tmp/codepush-sim-log.txt 2>&1 &
            DIFF_LOG_PID=$!
            envman add --key DIFF_LOG_PID --value "$DIFF_LOG_PID"
            echo "Diff log capture PID: $DIFF_LOG_PID"
    - script@1:
        title: Warm-up launch to trigger update B download
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            # Ensure the app is not running so the subsequent launch is a cold
            # start that triggers ON_APP_START and therefore the CodePush
            # check_update. Phase A's verify_codepush may have left the app
            # running, in which case a plain launch would only foreground it
            # (no ON_APP_START, no download) and the staging wait would time out.
            xcrun simctl terminate booted org.reactjs.native.example.BitriseReactNativeCodePush 2>/dev/null || true
            # Probe readiness with a SECOND, unfiltered log stream: `logger` is
            # not available in the iOS simulator runtime, so we cannot emit our
            # own sentinel line. An unfiltered stream outputs immediately since
            # system logs always flow; once /tmp/log-stream-ready.txt is non-empty
            # both this probe stream and the filtered capture stream are live.
            xcrun simctl spawn booted log stream \
              > /tmp/log-stream-ready.txt 2>&1 &
            READY_PID=$!
            timeout 15 bash -c '
              until [ -s /tmp/log-stream-ready.txt ]; do
                sleep 0.2
              done
            ' && echo "Log stream confirmed live" || echo "WARNING: stream init probe timed out — continuing"
            kill "$READY_PID" 2>/dev/null || true
            # Wait for the update to download + stage by watching CodePush's
            # on-disk state, not a JS log: the console.log "Update is installed..."
            # never reaches the simulator system log, so a log-grep always timed
            # out. CodePush stages each package under
            # <data_container>/Library/Application Support/CodePush/ — a new
            # <packageHash> subdirectory (and an updated codepush.json) appears
            # when staging completes. Snapshot that directory, launch, and poll
            # for any change. (Listings are compared directly rather than via
            # md5sum, which is not present on the macOS stack.)
            DATA_DIR=$(xcrun simctl get_app_container booted org.reactjs.native.example.BitriseReactNativeCodePush data 2>/dev/null || true)
            CODEPUSH_DIR="$DATA_DIR/Library/Application Support/CodePush"

            staging_wait() {
              local before after elapsed
              before=$(ls -1A "$CODEPUSH_DIR" 2>/dev/null | sort || true)
              xcrun simctl launch booted org.reactjs.native.example.BitriseReactNativeCodePush
              elapsed=0
              while [ "$elapsed" -lt 90 ]; do
                sleep 5
                elapsed=$((elapsed + 5))
                after=$(ls -1A "$CODEPUSH_DIR" 2>/dev/null | sort || true)
                if [ "$before" != "$after" ]; then
                  echo "OK: CodePush staging directory changed after ${elapsed}s — staging confirmed"
                  return 0
                fi
              done
              echo "WARNING: no CodePush staging change detected after 90s"
              return 1
            }

            if ! staging_wait; then
              echo "Retrying with a second warm-up launch..."
              xcrun simctl terminate booted org.reactjs.native.example.BitriseReactNativeCodePush 2>/dev/null || true
              sleep 2
              staging_wait || true
            fi
            xcrun simctl terminate booted org.reactjs.native.example.BitriseReactNativeCodePush 2>/dev/null || true
            sleep 1
    - script@1:
        title: Run Maestro test asserting update B marker
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            set -o pipefail
            maestro test -e CODEPUSH_UPDATE_MARKER="$CODEPUSH_UPDATE_MARKER_B" --format junit .maestro/codepush_update_test.yaml
    - script@1:
        title: Stop simulator log capture
        is_always_run: true
        inputs:
        - content: |-
            #!/usr/bin/env bash
            if [ -n "$DIFF_LOG_PID" ]; then
              kill "$DIFF_LOG_PID" 2>/dev/null || true
              sleep 1
            fi
    - script@1:
        title: Assert a diff (not a full package) was served
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            LOG=/tmp/codepush-sim-log.txt
            # Also pull the SDK's logs straight from the unified log store, in
            # case the live stream missed anything. Same retrieval the negative
            # tests use to assert SDK behavior.
            xcrun simctl spawn booted log show \
              --predicate 'eventMessage contains[cd] "CodePush"' \
              --last 15m >> "$LOG" 2>/dev/null || true
            [ -s "$LOG" ] || (echo "ERROR: simulator log is empty or missing" && exit 1)
            echo "=== Searching simulator log for diff evidence ==="
            # When the SDK applies a downloaded update it logs exactly one of
            # (CodePushPackage.m, via CPLog):
            #   [CodePush] Applying diff update.   -> a bundle diff was served
            #   [CodePush] Applying full update.   -> the full package was served
            # That line is the authoritative diff-vs-full signal.
            if grep -Eiq "Applying diff update" "$LOG"; then
              echo "OK: '[CodePush] Applying diff update.' found — the server served a bundle diff, not the full package."
              grep -Ei "Applying diff update" "$LOG" | head -5
            else
              echo "ERROR: '[CodePush] Applying diff update.' was not found in the simulator log."
              if grep -Eiq "Applying full update" "$LOG"; then
                echo "Found '[CodePush] Applying full update.' instead — update B was served as a FULL package, not a diff."
              fi
              echo "=== CodePush log lines ==="
              grep -Ei "codepush" "$LOG" | tail -200 || true
              exit 1
            fi
    - bundle::notify_slack_on_failure:
        inputs:
        - PRETEXT: ":rotating_light: *[Bare RN] CodePush E2E bundle diff test failed*"
        - MESSAGE: 'Possible issue: a bundle diff was not generated or not served. Either
            update B never received a diff_package_map (diff generation off /
            gate disabled / no eligible predecessor at the same app version) or
            the SDK downloaded the full package instead of the diff. — Logs:
            $BITRISE_BUILD_URL'
  IPA:
    summary: Build iOS simulator binary and create JS bundle.
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8: {}
    - npm@1:
        inputs:
        - command: install
    - cocoapods-install@2:
        inputs:
        - is_cache_disabled: true
        - source_root_path: ios
    - script@1:
        title: Set Version
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            VERSION=$(node -p "require('./package.json').version")
            [ -n "$VERSION" ] || (echo "Error: Could not extract version from package.json" && exit 1)
            envman add --key MARKETING_VERSION --value "$VERSION"
    - xcode-archive@6:
        inputs:
        - platform: iOS
        - distribution_method: development
        - automatic_code_signing: api-key
        - register_test_devices: 'yes'
    - deploy-to-bitrise-io@2: {}
app:
  envs:
  - BITRISE_PROJECT_PATH: ios/BitriseReactNativeCodePush.xcworkspace
    opts:
