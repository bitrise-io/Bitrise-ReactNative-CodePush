---
format_version: '13'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: react-native
workflows:
  ios_build_for_simulator:
    summary: Build iOS simulator binary and create JS bundle.
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8: {}
    - npm@1:
        inputs:
        - command: install
    - cocoapods-install@2:
        inputs:
        - is_cache_disabled: true
        - source_root_path: ios
    - script@1:
        title: Set Version
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            VERSION=$(node -p "require('./package.json').version")
            [ -n "$VERSION" ] || (echo "Error: Could not extract version from package.json" && exit 1)
            envman add --key MARKETING_VERSION --value "$VERSION"
    - xcode-build-for-simulator@3:
        inputs:
        - configuration: release
        - xcodebuild_options: |-
            CODE_SIGN_IDENTITY=""
            CODE_SIGNING_REQUIRED=NO
            CODE_SIGNING_ALLOWED=NO
            MARKETING_VERSION=$MARKETING_VERSION
            CODEPUSH_KEY=$CODE_PUSH_DEPLOYMENT_KEY_IOS_STAGE
            CODEPUSH_SERVER_URL=https://$BITRISE_WORKSPACE_ID.codepush.bitrise.io
        - verbose_log: 'yes'
    - deploy-to-bitrise-io@2: {}
  android_build_for_simulator:
    summary: Build Android release APK.
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8: {}
    - npm@1:
        inputs:
        - command: install
    - script@1:
        title: Set App Version
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            VERSION=$(node -p "require('./package.json').version")
            [ -n "1.1.0" ] || (echo "Error: Could not extract version from package.json" && exit 1)
            envman add --key APP_VERSION --value "1.1.0"
    - script@1:
        title: Inject Android deployment key
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            STRINGS_XML_PATH="$BITRISE_SOURCE_DIR/android/app/src/main/res/values/strings.xml"
            sed -i 's|<string moduleConfig="true" name="CodePushDeploymentKey"></string>|<string moduleConfig="true" name="CodePushDeploymentKey">'"$CODE_PUSH_DEPLOYMENT_KEY_ANDROID_STAGE"'</string>|g' "$STRINGS_XML_PATH"
    - android-build@1:
        inputs:
        - variant: release
        - arguments: "-PappVersionName=$APP_VERSION"
        - module: app
        - project_location: "$BITRISE_SOURCE_DIR/android"
    - deploy-to-bitrise-io@2: {}
    meta:
      bitrise.io:
        stack: ubuntu-latest-stable
        machine_type_id: elite
  codepush_update_to_server:
    summary: Push a CodePush update using the Bitrise CodePush CLI plugin.
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8: {}
    - npm@1:
        inputs:
        - command: install
    - script@1:
        title: Push CodePush update via CLI
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            set -o pipefail
            set -x

            INSTALLED=$(bitrise :codepush version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
            TARGET=$(curl -sf https://api.github.com/repos/bitrise-io/bitrise-plugins-codepush-cli/releases/latest 2>/dev/null | jq -r '.tag_name // empty' 2>/dev/null || true)
            if [ -n "$TARGET" ] && [ "$INSTALLED" = "$TARGET" ]; then
              echo "CodePush CLI $INSTALLED is up to date, skipping install"
            else
              bitrise plugin install --source https://github.com/bitrise-io/bitrise-plugins-codepush-cli.git
            fi

            export BITRISE_API_TOKEN="$BITRISE_PAT"
            VERSION=$(node -p "require('./package.json').version")

            bitrise :codepush push \
              --bundle \
              --platform ios \
              --app-version "$VERSION" \
              --deployment "$CODE_PUSH_DEPLOYMENT_ID_IOS_STAGE" \
              --app-id "$CONNECTED_APP_ID_IOS" \
              --rollout 100
    triggers:
      pull_request: []
      push:
      - branch: main
        commit_message:
          regex: ".*Codepush.*"
  codepush_bump_version:
    meta:
      bitrise.io:
        stack: ubuntu-noble-24.04-bitrise-2025-android
        machine_type_id: g2.linux.medium
    steps:
    - bundle::bump_codepush_version: {}
    - share-pipeline-variable@1.1.0:
        inputs:
        - variables: NEW_APP_VERSION
  codepush_bump_version_cli:
    meta:
      bitrise.io:
        stack: ubuntu-noble-24.04-bitrise-2025-android
        machine_type_id: g2.linux.medium
    steps:
    - bundle::bump_codepush_version:
        inputs:
        - CODEPUSH_VERSION_FILE: codepush-cli-version.json
        - VERSION_ENV_KEY: NEW_APP_VERSION_CLI
    - share-pipeline-variable@1.1.0:
        inputs:
        - variables: NEW_APP_VERSION_CLI
  codepush_bump_version_signed:
    meta:
      bitrise.io:
        stack: ubuntu-noble-24.04-bitrise-2025-android
        machine_type_id: g2.linux.medium
    steps:
    - bundle::bump_codepush_version:
        inputs:
        - CODEPUSH_VERSION_FILE: codepush-signed-version.json
        - VERSION_ENV_KEY: NEW_APP_VERSION_SIGNED
    - share-pipeline-variable@1.1.0:
        inputs:
        - variables: NEW_APP_VERSION_SIGNED
  codepush_validate_pat:
    meta:
      bitrise.io:
        stack: ubuntu-noble-24.04-bitrise-2025-android
        machine_type_id: g2.linux.medium
    steps:
    - script@1:
        title: Validate BITRISE_PAT against CodePush API
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            HTTP_STATUS=$(curl -s -o /tmp/pat_check.json -w "%{http_code}" \
              -H "Authorization: token $BITRISE_PAT" \
              "https://api.bitrise.io/v0.1/me")
            echo "HTTP status: $HTTP_STATUS"
            cat /tmp/pat_check.json
            if [ "$HTTP_STATUS" = "401" ]; then
              echo "ERROR: BITRISE_PAT is invalid or expired"
              exit 1
            fi
            echo "PAT is valid"
    - bundle::notify_slack_on_failure:
        inputs:
        - PRETEXT: ":key: *[Bare RN] CodePush nightly: BITRISE_PAT is invalid or expired*"
        - MESSAGE: The nightly pipeline was aborted because BITRISE_PAT returned HTTP 401.
            Please rotate the secret in the Bitrise app settings. —
            $BITRISE_BUILD_URL
  codepush_build_binary_plain:
    meta:
      bitrise.io:
        stack: osx-xcode-16.0.x
        machine_type_id: g2.mac.medium
    steps:
    - bundle::build_binary_simulator:
        inputs:
        - APP_VERSION: "$NEW_APP_VERSION"
