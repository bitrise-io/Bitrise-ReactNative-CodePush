            fi
    - script@1:
        title: Generate ephemeral wrong key pair
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            openssl genrsa -out /tmp/wrong_private_key.pem 2048
            chmod 600 /tmp/wrong_private_key.pem
    - script@1:
        title: Push update signed with wrong key
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            set -o pipefail
            set -x

            export BITRISE_API_TOKEN="$BITRISE_PAT"

            bitrise :codepush push \
              --bundle \
              --platform ios \
              --app-version "$NEW_APP_VERSION_WRONG_KEY" \
              --deployment "$CODE_PUSH_DEPLOYMENT_ID_IOS_STAGE" \
              --app-id "$CONNECTED_APP_ID_IOS" \
              --description "E2E negative test (wrong key) - marker: $CODEPUSH_UPDATE_MARKER_WRONG_KEY" \
              --rollout 100 \
              --private-key-path /tmp/wrong_private_key.pem
    - script@1:
        title: Remove wrong key
        is_always_run: true
        inputs:
        - content: |-
            #!/usr/bin/env bash
            rm -f /tmp/wrong_private_key.pem
    - script@1:
        title: Verify update was published to deployment
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            for i in 1 2 3; do
              RESPONSE=$(curl -s -w "\n%{http_code}" \
                -H "authorization: $BITRISE_PAT" \
                "https://api.bitrise.io/release-management/v2/code-push/v1/updates?deployment_id=$CODE_PUSH_DEPLOYMENT_ID_IOS_STAGE")
              HTTP_CODE=$(echo "$RESPONSE" | tail -1)
              BODY=$(echo "$RESPONSE" | head -n -1)
              [ "$HTTP_CODE" = "200" ] || (echo "ERROR: API returned HTTP $HTTP_CODE: $BODY" && exit 1)
              echo "$BODY" | grep -q "$CODEPUSH_UPDATE_MARKER_WRONG_KEY" && break
              echo "Attempt $i: marker not found yet, retrying in 5s..."
              sleep 5
            done
            echo "$BODY" | grep -q "$CODEPUSH_UPDATE_MARKER_WRONG_KEY" \
              || (echo "ERROR: marker $CODEPUSH_UPDATE_MARKER_WRONG_KEY not found in deployment after 3 attempts" && exit 1)
            echo "OK: update confirmed in deployment history"
    - bundle::notify_slack_on_failure:
        inputs:
        - MESSAGE: "Possible issue: wrong-key chain upload step failed. The CLI push exited with an error or the update was not published to the deployment. — Logs: $BITRISE_BUILD_URL"
    - share-pipeline-variable@1.1.0:
        inputs:
        - variables: CODEPUSH_UPDATE_MARKER_WRONG_KEY
  codepush_cli_unsigned_upload:
